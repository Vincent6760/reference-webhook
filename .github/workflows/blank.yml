name: Reference Discord Question

on:
  schedule:
    - cron: "0 17 */1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send next post
        run: |
          # ======================================

          readarray -t REFERENCES << 'EOF'
          media|https://cdn.discordapp.com/attachments/1345440188242854081/1480573271425683596/videoshitposting2.mp4?ex=69b02acf&is=69aed94f&hm=a749258bc4b2b08eb0fa8dfb587e8e63075ef1d1ae4e7bee5c7969735dc5c213&
          EOF

          # ======================================
          # DO NOT EDIT BELOW THIS LINE
          # ======================================

          if [ "${#REFERENCES[@]}" -eq 0 ]; then
            echo "No references found. Exiting."
            exit 0
          fi

          COUNT=${#REFERENCES[@]}

          # Pick random entry
          INDEX=$((RANDOM % COUNT))

          ENTRY="${REFERENCES[$INDEX]}"
          CONTENT="${ENTRY#*|}"

          # Detect file type
          if [[ "$CONTENT" =~ \.(jpg|jpeg|png|webp|gif|jfif)$ ]]; then

            curl -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"shitposting\",
                \"color\": 10181046,
                \"image\": {
                  \"url\": \"$CONTENT\"
                }
              }]
            }" \
            ${{ secrets.TORU }}

          else

            curl -X POST \
          -F "payload_json={
            \"embeds\": [{
              \"title\": \"shitposting\",
              \"color\": 10181046
              }]
          }" \
          -F "file=@<(curl -L $CONTENT)"     
          ${{ secrets.TORU }}

          fi
          
