name: Reference Discord Question

on:
  schedule:
    - cron: "0 17 */1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send next post
        env:
          WEBHOOK: ${{ secrets.TORU }}
        run: |
          # ======================================

          readarray -t REFERENCES << 'EOF'
          media|https://raw.githubusercontent.com/Vincent6760/reference-webhook/main/images/videoshitposting(2).mp4
          EOF

          # ======================================
          # DO NOT EDIT BELOW THIS LINE
          # ======================================

          if [ "${#REFERENCES[@]}" -eq 0 ]; then
            echo "No references found. Exiting."
            exit 0
          fi

          COUNT=${#REFERENCES[@]}

          # Pick random entry
          INDEX=$((RANDOM % COUNT))

          ENTRY="${REFERENCES[$INDEX]}"
          CONTENT="${ENTRY#*|}"

          # Detect file type
          if [[ "$CONTENT" =~ \.(jpg|jpeg|png|webp|gif|jfif)$ ]]; then

            curl -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"shitposting\",
                \"color\": 10181046,
                \"image\": {
                  \"url\": \"$CONTENT\"
                }
              }]
            }" \
            "$WEBHOOK"

          else

            curl -L "$CONTENT" -o video.mp4

            curl -X POST \
            -F "payload_json={
              \"embeds\": [{
                \"title\": \"shitposting\",
                \"color\": 10181046
              }]
            }" \
            -F "file=@video.mp4" \
            "$WEBHOOK"

          fi
