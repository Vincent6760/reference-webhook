name: Reference Discord Question

on:
  schedule:
    - cron: "0 17 */1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Send next post
        run: |
          # ======================================

          readarray -t REFERENCES << 'EOF'
          media|https://raw.githubusercontent.com/Vincent6760/reference-webhook/main/images/The_Cake_is_a_Lie_(12521108583).jpg
          media|https://raw.githubusercontent.com/Vincent6760/reference-webhook/main/images/mikuwhite.jfif
          media|https://raw.githubusercontent.com/Vincent6760/reference-webhook/main/images/silksong.png
          media|https://raw.githubusercontent.com/Vincent6760/reference-webhook/main/images/tameyourdragon.jpg
          media|https://raw.githubusercontent.com/Vincent6760/reference-webhook/main/images/grimm.jpg

          EOF

          # ======================================
          # DO NOT EDIT BELOW THIS LINE
          # ======================================

          if [ "${#REFERENCES[@]}" -eq 0 ]; then
            echo "No references found. Exiting."
            exit 0
          fi

          # Pick random index
          INDEX=$((RANDOM % ${#REFERENCES[@]}))

          ENTRY="${REFERENCES[$INDEX]}"
          CONTENT="${ENTRY#*|}"

          # Detect file type
          if [[ "$CONTENT" =~ \.(jpg|jpeg|png|webp|gif)$ ]]; then

            curl -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"shitposting\",
                \"color\": 10181046,
                \"image\": {
                  \"url\": \"$CONTENT\"
                }
              }]
            }" \
            ${{ secrets.TORU }}

          else

            curl -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"$CONTENT\"
            }" \
            ${{ secrets.TORU }}

          fi
